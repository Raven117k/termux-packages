name: Build Custom Termux Bootstrap
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Android package name'
        required: true
        default: 'com.aistudio.vscodeloader.hlab'
jobs:
  build-bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, x86_64]
    steps:
      - name: Checkout termux-packages
        uses: actions/checkout@v4
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af
          df -h
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.arch }}-${{ hashFiles('scripts/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.arch }}-
      - name: Generate bootstrap for ${{ matrix.arch }}
        env:
          TERMUX_APP_PACKAGE: ${{ github.event.inputs.package_name || 'com.aistudio.vscodeloader.hlab' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Building bootstrap for ${{ matrix.arch }} targeting package: $TERMUX_APP_PACKAGE"
          export TERMUX_APP__PACKAGE_NAME="$TERMUX_APP_PACKAGE"
          export TERMUX_APP_PACKAGE="$TERMUX_APP_PACKAGE"
          export TERMUX_REPO_APP__PACKAGE_NAME="$TERMUX_APP_PACKAGE"
          ./scripts/generate-bootstraps.sh --architectures "${{ matrix.arch }}" --package-name "$TERMUX_APP_PACKAGE" 2>&1 | tee "build-log-${{ matrix.arch }}.txt"
      - name: Prepare bootstrap artifact
        id: locate
        shell: bash
        run: |
          set -euo pipefail
          BOOTSTRAP_ZIP="$PWD/bootstrap-${{ matrix.arch }}.zip"
          ARTIFACT_DIR="$PWD/artifacts"
          mkdir -p "$ARTIFACT_DIR"
          echo "Checking archive path: $BOOTSTRAP_ZIP"
          pwd
          ls -la "$PWD"
          if [ -f "$BOOTSTRAP_ZIP" ]; then
            cp "$BOOTSTRAP_ZIP" "$ARTIFACT_DIR/bootstrap-${{ matrix.arch }}.zip"
            echo "Prepared artifact directory: $ARTIFACT_DIR"
            ls -lh "$ARTIFACT_DIR"
            unzip -l "$ARTIFACT_DIR/bootstrap-${{ matrix.arch }}.zip" | sed -n '1,20p'
            echo "zip_path=$ARTIFACT_DIR/bootstrap-${{ matrix.arch }}.zip" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "No bootstrap zip found at expected path. Listing workspace directory for debugging:"
            find "$PWD" -maxdepth 2 -type f | sed -n '1,200p'
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      - name: Upload bootstrap artifact
        if: steps.locate.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ github.event.inputs.package_name || 'com.aistudio.vscodeloader.hlab' }}-${{ matrix.arch }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
      - name: Upload build logs (always, even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.arch }}
          path: build-log-${{ matrix.arch }}.txt
          retention-days: 14
      - name: Upload full workspace for debugging
        if: steps.locate.outputs.found != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: debug-workspace-${{ matrix.arch }}
          path: |
            ${{ github.workspace }}
            !${{ github.workspace }}/**/*.deb
            !${{ github.workspace }}/.git/**
          retention-days: 7